version: "3.8"

services:
  android-emulator:
    # XÓA dòng 'image: ...' và THÊM dòng 'build: .'
    build: . 
    container_name: android-emulator-custom
    privileged: true
    devices:
      - "/dev/kvm:/dev/kvm"
    ports:
      - "6080:6080"
      - "5554:5554"
      - "5555:5555"
    environment:
      - EMULATOR_DEVICE=Samsung Galaxy S10
      - WEB_VNC=true
      - APPIUM=false